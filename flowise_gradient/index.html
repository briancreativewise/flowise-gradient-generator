  <main class="layout">
    <aside class="panel">
      <div class="panel-section">
        <div class="panel-label-row">
          <h2 class="panel-label">Format</h2>
        </div>
        <div class="segmented" id="formatGroup">
          <div class="segmented-thumb" id="segmentedThumb"></div>
          <button class="format-btn active" data-format="16:9">16:9</button>
          <button class="format-btn" data-format="1:1">1:1</button>
          <button class="format-btn" data-format="4:5">4:5</button>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-label-row">
          <h2 class="panel-label">Colors</h2>
          <span class="panel-hint" id="colorCount">4 of 8 points</span>
        </div>

        <div class="color-group">
          <span class="color-group-label">Accents</span>
          <div class="swatch-row" id="accentSwatches"></div>
        </div>

        <div class="color-group">
          <span class="color-group-label">Base</span>
          <div class="swatch-row" id="baseSwatches"></div>
        </div>

        <div class="color-group">
          <span class="color-group-label">Greys</span>
          <div class="swatch-row" id="greySwatches"></div>
        </div>

        <p class="panel-caption">Tap a color to add a point. Tap a point to remove it.</p>
      </div>

      <div class="panel-section">
        <div class="panel-label-row">
          <h2 class="panel-label">Softness</h2>
        </div>
        <div class="slider-row">
          <input type="range" id="softnessSlider" min="0" max="100" value="55">
        </div>
      </div>

      <div class="panel-section">
        <button class="btn btn-ghost" id="shuffleBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></svg>
          Shuffle
        </button>
      </div>

      <div class="panel-section panel-export">
        <button class="btn btn-primary" id="exportBtn">Export PNG</button>
        <p class="export-meta" id="exportMeta">1920 × 1080 · PNG</p>
      </div>
    </aside>

    <section class="stage">
      <div class="stage-canvas-area" id="stageCanvasArea">
        <div class="canvas-wrap" id="canvasWrap">
          <canvas id="gradientCanvas"></canvas>
          <div class="points-layer" id="pointsLayer"></div>
        </div>
      </div>
      <p class="stage-hint">Drag the points to reshape the gradient.</p>
    </section>
  </main>
